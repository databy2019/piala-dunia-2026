            function calculateStandings(g) {
                const teams = groupsData[g];
                const standings = teams.map((t, i) => ({
                    name: t,
                    pld: 0,
                    w: 0,
                    d: 0,
                    l: 0,
                    gf: 0,
                    ga: 0,
                    gd: 0,
                    pts: 0,
                }));
                const matches = groupMatchesWIB[g];
                if (!scores.groups[g]) scores.groups[g] = {};
                matches.forEach((m, i) => {
                    const s = scores.groups[g][i];
                    if (s && s.t1 !== "" && s.t2 !== "") {
                        const s1 = parseInt(s.t1),
                            s2 = parseInt(s.t2);
                        const t1 = standings[m[0]],
                            t2 = standings[m[1]];
                        t1.pld++;
                        t2.pld++;
                        t1.gf += s1;
                        t1.ga += s2;
                        t2.gf += s2;
                        t2.ga += s1;
                        t1.gd = t1.gf - t1.ga;
                        t2.gd = t2.gf - t2.ga;
                        if (s1 > s2) {
                            t1.w++;
                            t1.pts += 3;
                            t2.l++;
                        } else if (s1 < s2) {
                            t2.w++;
                            t2.pts += 3;
                            t1.l++;
                        } else {
                            t1.d++;
                            t2.d++;
                            t1.pts++;
                            t2.pts++;
                        }
                    }
                });
                return standings.sort(
                    (a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf,
                );
            }

            function getAllQualifiers() {
                const q = {};
                const third = [];
                for (const g in groupsData) {
                    const s = calculateStandings(g);
                    q[`1${g}`] = s[0].name;
                    q[`2${g}`] = s[1].name;
                    third.push({ name: s[2].name, pts: s[2].pts, gd: s[2].gd });
                }
                third.sort((a, b) => b.pts - a.pts || b.gd - a.gd);
                for (let i = 0; i < 8; i++)
                    q[`3rd_${i + 1}`] = third[i]
                        ? third[i].name
                        : `Posisi 3 Terbaik ${i + 1}`;
                return q;
            }

            function getKoTeams() {
                // Pastikan scores dan scores.knockout ada, jika tidak, gunakan objek kosong
                // const knockoutData =
                //     scores && scores.knockout ? scores.knockout : {};
                const qualifiers = getAllQualifiers();
                const ko = { ...qualifiers };
                // Deklarasi knockoutData hanya sekali di sini
                const knockoutData =
                    scores && scores.knockout ? scores.knockout : {};

                ["r32", "r16", "qf", "sf"].forEach((r) => {
                    koStructure[r].forEach((m) => {
                        const s = knockoutData[m.id] || {
                            t1: "",
                            t2: "",
                            pWinner: "",
                        };

                        const t1 = ko[`t1_${m.id}`] || ko[m.t1Home] || m.t1Home;
                        const t2 = ko[`t2_${m.id}`] || ko[m.t2Home] || m.t2Home;

                        let win = "",
                            lose = "";
                        if (s && s.t1 !== "" && s.t2 !== "") {
                            const s1 = parseInt(s.t1),
                                s2 = parseInt(s.t2);
                            if (s1 > s2) {
                                win = t1;
                                lose = t2;
                            } else if (s2 > s1) {
                                win = t2;
                                lose = t1;
                            } else if (s.pWinner) {
                                win = s.pWinner === "t1" ? t1 : t2;
                                lose = s.pWinner === "t1" ? t2 : t1;
                            }
                        }

                        if (win) {
                            if (m.slot === "t1") ko[`t1_${m.nextMatch}`] = win;
                            else ko[`t2_${m.nextMatch}`] = win;
                        }
                        if (lose && m.loseToMatch) {
                            if (m.loseSlot === "t1")
                                ko[`t1_${m.loseToMatch}`] = lose;
                            else ko[`t2_${m.loseToMatch}`] = lose;
                        }
                    });
                });
                return ko;
            }

                if (!scores.groups[g][i])

            }

                if (!scores.knockout[id])

                    ? (scores.knockout[id].t1 = v)
                    : (scores.knockout[id].t2 = v);
                if (scores.knockout[id].t1 != scores.knockout[id].t2)
                    scores.knockout[id].pWinner = "";
                saveData();
                renderKnockout();
            }

            function setPen(id, slot) {
                scores.knockout[id].pWinner = slot;
                saveData();
                renderKnockout();
            }

            function renderKnockout() {
                if (currentTab !== "ko") return;
                const c = document.getElementById("tab-ko-content");
                c.innerHTML = "";
                const koTeams = getKoTeams();

                for (const round in koStructure) {
                    const sec = document.createElement("div");
                    sec.innerHTML = `<h2 class="text-xl font-bold border-b mb-3">${round.toUpperCase()}</h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>`;

                    koStructure[round].forEach((m) => {
                        const t1 =
                            koTeams[`t1_${m.id}`] ||
                            koTeams[m.t1Home] ||
                            m.t1Home;
                        const t2 =
                            koTeams[`t2_${m.id}`] ||
                            koTeams[m.t2Home] ||
                            m.t2Home;
                        const s =
                            scores && scores.knockout && scores.knockout[m.id]
                                ? scores.knockout[m.id]
                                : { t1: "", t2: "", pWinner: "" };

                        sec.querySelector("div").innerHTML += `
                              <div class="bg-white p-3 rounded shadow border border-slate-200 text-xs">
                                  <div class="text-[10px] text-slate-400 mb-1">Match ${m.id}</div>
                                  <div class="flex justify-between items-center my-2">
                                      <span class="truncate w-1/2">${t1}</span>
                                      <input type="number" class="w-10 h-8 text-center font-bold text-blue-700 bg-blue-50 border border-blue-200 rounded" oninput="onKoScore(${m.id}, true, this.value)" value="${s.t1}">
                                  </div>
                                  <div class="flex justify-between items-center">
                                      <span class="truncate w-1/2">${t2}</span>
                                      <input type="number" class="w-10 h-8 text-center font-bold text-blue-700 bg-blue-50 border border-blue-200 rounded" oninput="onKoScore(${m.id}, false, this.value)" value="${s.t2}">
                                  </div>
                              </div>`;
                    });
                    c.appendChild(sec);
                }
            }
            init();
        </script>
    </body>
</html>
